<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>단서 찾기</title>
<link rel="stylesheet" href="../../shared/style.css?v=3">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">단서 찾기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
  </header>

  <div class="intro-body">
    <div class="intro-thumb-row">
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="10" width="68" height="44" rx="10" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
        <text x="40" y="30" text-anchor="middle" font-size="9" font-weight="900" fill="#2C2C2C" font-family="sans-serif">야옹~</text>
        <text x="40" y="46" text-anchor="middle" font-size="9" font-weight="900" fill="#2C2C2C" font-family="sans-serif">우는 동물?</text>
        <circle cx="58" cy="58" r="14" fill="none" stroke="#FFD54F" stroke-width="4"/>
        <line x1="68" y1="68" x2="76" y2="76" stroke="#FFD54F" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="72" height="72" rx="10" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
        <rect x="10" y="10" width="18" height="18" rx="3" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="1.5"/><text x="19" y="24" text-anchor="middle" font-size="12">🐶</text>
        <rect x="31" y="10" width="18" height="18" rx="3" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="1.5"/><text x="40" y="24" text-anchor="middle" font-size="12">🐱</text>
        <rect x="52" y="10" width="18" height="18" rx="3" fill="#C8E6C9" stroke="#2C2C2C" stroke-width="1.5"/><text x="61" y="24" text-anchor="middle" font-size="12">🐰</text>
        <rect x="10" y="31" width="18" height="18" rx="3" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="1.5"/><text x="19" y="45" text-anchor="middle" font-size="12">🐻</text>
        <rect x="31" y="31" width="18" height="18" rx="3" fill="#FFF8E1" stroke="#FFD54F" stroke-width="3"/><text x="40" y="45" text-anchor="middle" font-size="12">🐱</text>
        <rect x="52" y="31" width="18" height="18" rx="3" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="1.5"/><text x="61" y="45" text-anchor="middle" font-size="12">🦁</text>
      </svg>
    </div>

    <p class="intro-text">P1이 단서를 읽으면<br>P2가 정답을 찾아요!</p>
    <p class="intro-subtext">2인 협동 · 10라운드 · 6개 이상 맞히면 성공</p>

    <div class="select-label">인원 선택</div>
    <div class="player-select-row">
      <button class="player-btn active" data-count="2">2명</button>
    </div>
  </div>

  <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">

  <div class="top-bar">
    <div class="top-bar-meta">
      <div class="question-counter" id="questionCounter">1 / 10</div>
      <div class="problem-timer" id="problemTimer">20</div>
    </div>
    <div class="cat-tag" id="catTag">동물</div>
    <div class="problem-status" id="problemStatus">단서를 잘 들어보세요!</div>
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </div>

  <div class="zones-wrap p2">
    <div class="zone p1">
      <div class="zone-header">
        <span class="zone-label">P1 — 단서 읽기</span>
      </div>
      <div class="clue-stage">
        <div class="clue-card">
          <div class="clue-text" id="clueText"></div>
        </div>
        <div class="clue-hint">P2에게 단서를 읽어주세요!</div>
      </div>
    </div>

    <div class="zone p2">
      <div class="zone-header">
        <span class="zone-label">P2 — 정답 찾기</span>
      </div>
      <div class="answer-grid pic-grid-3x3" id="picGrid"></div>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-chip">
      <span class="score-chip-dot" style="background:#26A69A"></span>
      <span>점수</span>
      <span class="score-chip-val" id="scoreVal">0</span>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <header class="result-header">
    <h2 class="result-title" id="resultTitle">게임 종료!</h2>
  </header>
  <div class="result-winner" id="resultWinner"></div>

  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0/10</span></div>
    <div class="stat-row"><span class="stat-label">맞힌 단서</span><span class="stat-val" id="statPerfect">0회</span></div>
  </div>

  <div class="result-actions">
    <button class="btn btn-primary btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-secondary btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=3"></script>
<script src="game.js"></script>
</body>
</html>
