<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>색 맞춰 터치</title>
  <link rel="stylesheet" href="../../shared/style.css?v=3">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">색 맞춰 터치</h1>
      <button class="icon-btn sound-btn" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 130 84" width="180" height="116">
          <!-- target swatch -->
          <rect x="46" y="6" width="38" height="26" rx="8" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="65" cy="19" r="8" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2"/>
          <text x="65" y="46" text-anchor="middle" font-size="9" font-weight="900" fill="#2C2C2C">지금 색!</text>
          <!-- candidate dots -->
          <circle cx="22" cy="68" r="11" fill="#42A5F5" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="22" cy="68" r="4" fill="#fff" opacity="0.5"/>
          <path d="M16 68 l4 4 l7 -8" stroke="#1B5E20" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="54" cy="70" r="10" fill="#EF5350" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="84" cy="70" r="10" fill="#FFEE58" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="110" cy="68" r="11" fill="#42A5F5" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="110" cy="68" r="4" fill="#fff" opacity="0.5"/>
          <path d="M104 68 l4 4 l7 -8" stroke="#1B5E20" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <p class="intro-desc">지금 색과 같은 색 점만 터치!</p>
      <p class="intro-sub">색은 자주 바뀌어요. 30초 동안 가장 많이 맞힌 사람이 승리!<br>다른 색을 누르면 점수가 깎여요.</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="game-hud" id="gameHud">
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <span class="hud-timer-text" id="timerText">30</span>
      </div>
      <button class="icon-btn hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="target-bar" id="targetBar">
      <span class="target-label">지금 색</span>
      <span class="target-swatch" id="targetSwatch"></span>
      <span class="target-name" id="targetName">파랑</span>
    </div>

    <div class="hud-scores" id="hudScores">
      <!-- dynamically populated -->
    </div>

    <div class="game-zones" id="gameZones">
      <!-- dynamically populated -->
    </div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-crown">🏆</div>
      <h2 class="result-winner-label" id="resultWinnerLabel">승자</h2>
      <div class="result-winner-name" id="resultWinnerName">P1</div>
      <div class="result-scores" id="resultScores">
        <!-- dynamically populated -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=3"></script>
  <script src="game.js"></script>
</body>
</html>
