<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>같은 그림 찾기</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">같은 그림 찾기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
  </header>

  <div class="intro-body">
    <div class="intro-thumb-row">
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="72" height="72" rx="10" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
        <text x="40" y="55" text-anchor="middle" font-size="40">🦁</text>
      </svg>
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="72" height="72" rx="10" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
        <text x="40" y="35" text-anchor="middle" font-size="20">🐶</text>
        <text x="40" y="62" text-anchor="middle" font-size="20">🦁</text>
        <circle cx="40" cy="58" r="11" fill="none" stroke="#FFD54F" stroke-width="3"/>
      </svg>
    </div>

    <p class="intro-text">P1이 본 그림을<br>P2에게 설명해주세요!</p>
    <p class="intro-subtext">2인 협동 · 5라운드 · 3점 이상 성공</p>

    <div class="select-label">인원 선택</div>
    <div class="player-select-row">
      <button class="player-btn active" data-count="2">2명</button>
    </div>
  </div>

  <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">

  <div class="top-bar">
    <div class="top-bar-meta">
      <div class="question-counter" id="questionCounter">1 / 5</div>
      <div class="problem-timer" id="problemTimer">25</div>
    </div>
    <div class="cat-tag" id="catTag">동물</div>
    <div class="problem-status" id="problemStatus">그림을 잘 보세요!</div>
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </div>

  <div class="zones-wrap p2">
    <div class="zone p1">
      <div class="zone-header">
        <span class="zone-label">P1 — 설명하는 사람</span>
      </div>
      <div class="target-stage">
        <div class="target-card" id="targetCard">
          <div class="target-emoji" id="targetEmoji">🎮</div>
        </div>
        <div class="target-hint">P2에게 말로 설명!</div>
      </div>
    </div>

    <div class="zone p2">
      <div class="zone-header">
        <span class="zone-label">P2 — 찾는 사람</span>
      </div>
      <div class="answer-grid pic-grid-3x3" id="picGrid"></div>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-chip">
      <span class="score-chip-dot" style="background:#1565C0"></span>
      <span>점수</span>
      <span class="score-chip-val" id="scoreVal">0</span>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <header class="result-header">
    <h2 class="result-title" id="resultTitle">게임 종료!</h2>
  </header>
  <div class="result-winner" id="resultWinner"></div>

  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0/5</span></div>
    <div class="stat-row"><span class="stat-label">정답</span><span class="stat-val" id="statPerfect">0회</span></div>
  </div>

  <div class="result-actions">
    <button class="btn btn-primary btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-secondary btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
