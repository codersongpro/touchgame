<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>같은 그림 찾기</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">같은 그림 찾기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>

  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- Left: P1 sees one target -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="6" y="6" width="68" height="68" rx="8" fill="#fff" stroke="#00897B" stroke-width="2"/>
        <text x="40" y="52" text-anchor="middle" font-size="36">🦁</text>
        <circle cx="68" cy="12" r="5" fill="#00897B"/>
        <text x="68" y="15" text-anchor="middle" font-size="7" font-weight="900" fill="#fff">👁</text>
      </svg>
      <!-- Speech bubble / arrow -->
      <svg viewBox="0 0 50 40" width="40" height="32">
        <path d="M6 20 L38 20 M32 14 L38 20 L32 26" stroke="#00897B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="25" y="13" text-anchor="middle" font-size="10" font-weight="800" fill="#00897B">🗣</text>
      </svg>
      <!-- Right: P2 sees grid of options -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="6" y="6" width="68" height="68" rx="8" fill="#004D40"/>
        <rect x="12" y="12" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="32" y="12" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="52" y="12" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="12" y="32" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="32" y="32" width="18" height="18" rx="3" fill="#FFD54F"/>
        <rect x="52" y="32" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="12" y="52" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="32" y="52" width="18" height="18" rx="3" fill="#26A69A"/>
        <rect x="52" y="52" width="18" height="18" rx="3" fill="#26A69A"/>
        <text x="21" y="26" text-anchor="middle" font-size="11">🐱</text>
        <text x="41" y="26" text-anchor="middle" font-size="11">🐼</text>
        <text x="61" y="26" text-anchor="middle" font-size="11">🐶</text>
        <text x="21" y="46" text-anchor="middle" font-size="11">🐰</text>
        <text x="41" y="46" text-anchor="middle" font-size="11">🦁</text>
        <text x="61" y="46" text-anchor="middle" font-size="11">🐯</text>
        <text x="21" y="66" text-anchor="middle" font-size="11">🐻</text>
        <text x="41" y="66" text-anchor="middle" font-size="11">🐮</text>
        <text x="61" y="66" text-anchor="middle" font-size="11">🐷</text>
      </svg>
    </div>

    <p class="intro-text">P1이 본 그림을 말로 설명!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">P1이 본 그림을 P2에게<br><b>말로</b> 설명해주세요!</p>

    <ul class="intro-rules">
      <li>왼쪽(P1): 목표 그림 1개가 보임</li>
      <li>오른쪽(P2): 9개 중 정답 그림을 탭</li>
      <li>특징을 잘 설명해야 정답!</li>
      <li>5라운드, 3점 이상 성공!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🔍 PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-round" id="hudRound">1/5</span>
    <div class="hud-timer-track"><div class="hud-timer-fill" id="hudTimerFill" style="width:100%"></div></div>
    <span class="hud-score" id="hudScore">0점</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>

  <div class="banner" id="banner"></div>

  <div class="boards">
    <div class="board p1">
      <div class="board-label">👁 P1 목표</div>
      <div class="board-sub">P2에게 설명해주세요!</div>
      <div class="target-box" id="targetBox"></div>
      <div class="cat-tag" id="catTag"></div>
    </div>
    <div class="board p2">
      <div class="board-label">🎮 P2 정답 찾기</div>
      <div class="board-sub">맞는 그림을 탭!</div>
      <div class="pic-grid" id="picGrid"></div>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <h2 class="result-headline" id="resultHeadline">성공!</h2>
  <p class="result-sub" id="resultSub">호흡이 잘 맞았어요!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0/5</span></div>
    <div class="stat-row"><span class="stat-label">정답</span><span class="stat-val" id="statPerfect">0회</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
