<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>색칠 채우기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">색칠 채우기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <!-- 4x4 grid demo with flood-fill visualization -->
          <rect x="6"  y="6"  width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="34" y="6"  width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="62" y="6"  width="26" height="26" rx="5" fill="#EF5350" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="90" y="6"  width="26" height="26" rx="5" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2.5"/>

          <rect x="6"  y="34" width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="34" y="34" width="26" height="26" rx="5" fill="#66BB6A" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="62" y="34" width="26" height="26" rx="5" fill="#EF5350" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="90" y="34" width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>

          <rect x="6"  y="62" width="26" height="26" rx="5" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="34" y="62" width="26" height="26" rx="5" fill="#EF5350" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="62" y="62" width="26" height="26" rx="5" fill="#66BB6A" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="90" y="62" width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>

          <rect x="6"  y="90" width="26" height="26" rx="5" fill="#EF5350" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="34" y="90" width="26" height="26" rx="5" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="62" y="90" width="26" height="26" rx="5" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="90" y="90" width="26" height="26" rx="5" fill="#66BB6A" stroke="#2C2C2C" stroke-width="2.5"/>

          <!-- highlight top-left starting area -->
          <rect x="3"  y="3"  width="32" height="32" rx="6" fill="none" stroke="#7C4DFF" stroke-width="3" stroke-dasharray="4,3"/>
        </svg>
      </div>
      <p class="intro-text">왼쪽 위에서 시작!<br>색 버튼을 눌러 격자를 한 색으로!</p>
      <p class="intro-subtext">먼저 다 채운 사람 승! · 3라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">45</div>
      </div>
      <div class="problem-status" id="problemStatus">왼쪽 위부터 색을 칠해 한 색으로!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
