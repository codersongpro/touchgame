<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>빠르게 분류</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">빠르게 분류</h1>
      <button class="icon-btn sound-btn" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 90" width="160" height="120">
          <!-- 왼쪽 동물 (강아지) -->
          <circle cx="30" cy="50" r="22" fill="#FFD180" stroke="#2C2C2C" stroke-width="2.5"/>
          <ellipse cx="18" cy="36" rx="6" ry="9" fill="#FFB74D" stroke="#2C2C2C" stroke-width="2"/>
          <ellipse cx="42" cy="36" rx="6" ry="9" fill="#FFB74D" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="24" cy="48" r="2.4" fill="#2C2C2C"/>
          <circle cx="36" cy="48" r="2.4" fill="#2C2C2C"/>
          <ellipse cx="30" cy="56" rx="3" ry="2.2" fill="#2C2C2C"/>
          <path d="M26 60 Q30 64 34 60" fill="none" stroke="#2C2C2C" stroke-width="1.8" stroke-linecap="round"/>
          <!-- 가운데 화살표 -->
          <text x="60" y="56" font-size="18" font-weight="900" fill="#2C2C2C" text-anchor="middle">VS</text>
          <!-- 오른쪽 식물 (사과나무) -->
          <ellipse cx="90" cy="42" rx="22" ry="22" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="86" y="58" width="8" height="14" fill="#8D6E63" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="82" cy="38" r="4" fill="#EF5350" stroke="#2C2C2C" stroke-width="1.5"/>
          <circle cx="96" cy="34" r="4" fill="#EF5350" stroke="#2C2C2C" stroke-width="1.5"/>
          <circle cx="98" cy="48" r="4" fill="#EF5350" stroke="#2C2C2C" stroke-width="1.5"/>
        </svg>
      </div>

      <p class="intro-desc">동물인지 식물인지 빠르게 골라요!</p>
      <p class="intro-sub">30초 동안 가장 많이 맞힌 플레이어 승리 (2인 대결)</p>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="game-hud" id="gameHud">
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <span class="hud-timer-text" id="timerText">30</span>
      </div>
      <div class="hud-scores" id="hudScores">
        <!-- dynamically populated -->
      </div>
      <button class="icon-btn hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="game-zones" id="gameZones">
      <!-- dynamically populated -->
    </div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-crown">🏆</div>
      <h2 class="result-winner-label" id="resultWinnerLabel">승자</h2>
      <div class="result-winner-name" id="resultWinnerName">P1</div>
      <div class="result-scores" id="resultScores">
        <!-- dynamically populated -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
