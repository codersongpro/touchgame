<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>박자 따라하기</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">박자 따라하기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
  </header>

  <div class="intro-body">
    <div class="intro-thumb-row">
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="72" height="72" rx="10" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
        <rect x="10" y="10" width="28" height="28" rx="6" fill="#EF5350" stroke="#2C2C2C" stroke-width="2"/>
        <rect x="42" y="10" width="28" height="28" rx="6" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2"/>
        <rect x="10" y="42" width="28" height="28" rx="6" fill="#FFEE58" stroke="#2C2C2C" stroke-width="2"/>
        <rect x="42" y="42" width="28" height="28" rx="6" fill="#66BB6A" stroke="#2C2C2C" stroke-width="2"/>
        <circle cx="56" cy="24" r="6" fill="none" stroke="#FFD54F" stroke-width="3"/>
      </svg>
      <svg class="intro-thumb" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="72" height="72" rx="10" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
        <circle cx="20" cy="40" r="8" fill="#EF5350" stroke="#2C2C2C" stroke-width="2"/>
        <circle cx="36" cy="40" r="8" fill="#42A5F5" stroke="#2C2C2C" stroke-width="2"/>
        <circle cx="52" cy="40" r="8" fill="#FFEE58" stroke="#2C2C2C" stroke-width="2"/>
        <circle cx="68" cy="40" r="8" fill="#66BB6A" stroke="#2C2C2C" stroke-width="2"/>
        <text x="40" y="20" text-anchor="middle" font-size="11" font-weight="900" fill="#2C2C2C">🎵 시퀀스</text>
        <text x="40" y="62" text-anchor="middle" font-size="9" font-weight="800" fill="#7C4DFF">P1 → P2 → P1...</text>
      </svg>
    </div>

    <p class="intro-text">박자 시퀀스를 함께 기억!<br>번갈아 가며 따라 치세요!</p>
    <p class="intro-subtext">2인 협동 · 10라운드 · 3점 이상 성공</p>

    <div class="select-label">인원 선택</div>
    <div class="player-select-row">
      <button class="player-btn active" data-count="2">2명</button>
    </div>
  </div>

  <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">

  <div class="top-bar">
    <div class="top-bar-meta">
      <div class="question-counter" id="questionCounter">1 / 10</div>
      <div class="problem-timer" id="problemTimer">20</div>
    </div>
    <div class="cat-tag" id="catTag">박자 3개</div>
    <div class="problem-status" id="problemStatus">박자를 잘 들으세요!</div>
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </div>

  <div class="zones-wrap p2">
    <div class="zone p1">
      <div class="zone-header">
        <span class="zone-label">P1</span>
        <span class="turn-indicator" id="turnP1">대기</span>
      </div>
      <div class="progress-row" id="progressP1"></div>
      <div class="pad-grid" id="padGridP1"></div>
    </div>

    <div class="zone p2">
      <div class="zone-header">
        <span class="zone-label">P2</span>
        <span class="turn-indicator" id="turnP2">대기</span>
      </div>
      <div class="progress-row" id="progressP2"></div>
      <div class="pad-grid" id="padGridP2"></div>
    </div>
  </div>

  <div class="score-bar">
    <div class="score-chip">
      <span class="score-chip-dot" style="background:#FF7043"></span>
      <span>점수</span>
      <span class="score-chip-val" id="scoreVal">0</span>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <header class="result-header">
    <h2 class="result-title" id="resultTitle">게임 종료!</h2>
  </header>
  <div class="result-winner" id="resultWinner"></div>

  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0/10</span></div>
    <div class="stat-row"><span class="stat-label">완벽 라운드</span><span class="stat-val" id="statPerfect">0회</span></div>
  </div>

  <div class="result-actions">
    <button class="btn btn-primary btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-secondary btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
