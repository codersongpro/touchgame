<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>틀린 그림 찾기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=3">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">틀린 그림 찾기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>
    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 70" width="160" height="93">
          <rect x="2" y="2" width="56" height="36" rx="6" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <circle cx="20" cy="14" r="5" fill="#FFD54F"/>
          <rect x="34" y="22" width="14" height="10" fill="#FFB74D"/>
          <rect x="62" y="2" width="56" height="36" rx="6" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <circle cx="80" cy="14" r="5" fill="#FF7043"/>
          <rect x="94" y="22" width="14" height="10" fill="#FFB74D"/>
          <text x="60" y="58" text-anchor="middle" font-size="14" font-weight="900" fill="#2C2C2C">VS</text>
          <circle cx="20" cy="14" r="9" fill="none" stroke="#4CAF50" stroke-width="2"/>
        </svg>
      </div>
      <p class="intro-text">두 그림에서<br>다른 부분을 먼저 찾으세요!</p>
      <p class="intro-subtext">10개 테마 · 라운드별 점점 어려워짐 · 먼저 다 찾으면 승</p>

      <div class="select-label">테마 선택 (10개)</div>
      <div class="theme-grid" id="themeGrid"></div>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 5</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">다른 부분을 찾으세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>
    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>
    <div class="total-row" id="totalRow"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=3"></script>
  <script src="game.js"></script>
</body>
</html>
