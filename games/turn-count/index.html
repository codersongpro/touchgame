<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>번갈아 카운트</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">번갈아 카운트</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: P1 1·3·5 / P2 2·4·6 → 목표 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <!-- P1 zone -->
          <rect x="6" y="20" width="84" height="86" rx="14" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="48" y="36" text-anchor="middle" font-size="10" font-weight="900" fill="#1565C0">P1</text>
          <circle cx="22" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="22" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">1</text>
          <circle cx="48" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="48" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">3</text>
          <circle cx="74" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="74" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">5</text>
          <text x="48" y="96" text-anchor="middle" font-size="9" font-weight="800" fill="#1565C0">홀수</text>

          <!-- 화살표 -->
          <text x="106" y="68" text-anchor="middle" font-size="22" font-weight="900" fill="#7C4DFF">→</text>

          <!-- P2 zone -->
          <rect x="124" y="20" width="84" height="86" rx="14" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="166" y="36" text-anchor="middle" font-size="10" font-weight="900" fill="#C62828">P2</text>
          <circle cx="140" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="140" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">2</text>
          <circle cx="166" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="166" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">4</text>
          <circle cx="192" cy="62" r="11" fill="#FFF" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="192" y="67" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">6</text>
          <text x="166" y="96" text-anchor="middle" font-size="9" font-weight="800" fill="#C62828">짝수</text>

          <!-- 목표 별 -->
          <polygon points="226,46 230,58 242,58 232,66 236,78 226,70 216,78 220,66 210,58 222,58"
                   fill="#FFD54F" stroke="#2C2C2C" stroke-width="2.5"/>
        </svg>
      </div>

      <p class="intro-text">번갈아 숫자를 눌러 목표까지 카운트!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#7C4DFF" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>P1은 홀수, P2는 짝수 — 잘못 누르면 카운트 -2!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
            <polyline points="16 7 22 7 22 13"/>
          </svg>
          <span>1부터 차례차례 눌러 목표 숫자에 도달!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>5라운드 · 시간 점점 짧아짐 (18→10초)</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/5</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 카운트 + 목표 + 타이머 -->
    <div class="count-area">
      <div class="count-row">
        <div class="count-now">
          <span class="count-now-label">지금</span>
          <span class="count-now-val" id="countNow">0</span>
        </div>
        <span class="count-arrow">→</span>
        <div class="count-goal">
          <span class="count-goal-label">목표</span>
          <span class="count-goal-val" id="goalVal">10</span>
        </div>
        <div class="count-timer">
          <span class="count-timer-label">⏱</span>
          <span class="count-timer-val" id="timerVal">18</span>
        </div>
      </div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 보드 (P1 홀수 / P2 짝수) -->
    <div class="boards">
      <div class="board p1" id="board1">
        <div class="board-label">🧒 P1 · 홀수</div>
        <button class="tap-btn" id="tapP1" type="button">
          <span class="tap-btn-num" id="tapP1Num">1</span>
          <span class="tap-btn-hint">내 차례!</span>
        </button>
      </div>
      <div class="board p2" id="board2">
        <div class="board-label">🧑 P2 · 짝수</div>
        <button class="tap-btn" id="tapP2" type="button">
          <span class="tap-btn-num" id="tapP2Num">2</span>
          <span class="tap-btn-hint">내 차례!</span>
        </button>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">5/5</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>

</body>
</html>
