<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="TouchGame, 터치게임, 미니게임, 교실 게임, 터치스크린 게임, 두뇌 게임, 협력 게임, 무료 게임">

  <title>TouchGame — Retro Touch Arcade</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#101827">

  <style>
    /* === Launcher page background === */
    body {
      background: #FFFFFF;
      min-height: 100vh;
    }

    .launcher-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .brand-logo {
      flex-shrink: 0;
      filter: drop-shadow(0 2px 8px rgba(124,77,255,0.25));
    }
    .launcher-title {
      font-size: var(--font-size-title);
      font-weight: 800;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #5c6bc0, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .launcher-byline {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-sub);
      align-self: flex-end;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex-shrink: 1;
    }
    @media (max-width: 360px) {
      .launcher-byline { display: none; }
    }

    /* 필터 영역 */
    .filter-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-sm);
    }

    .filter-label {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-sm);
    }

    .filter-btn {
      padding: var(--space-sm) var(--space-md);
      border: none;
      border-radius: var(--btn-radius);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: var(--font-family);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(124,92,252,0.3);
    }

    /* 카테고리 필터 — 각 카테고리별 색상 */
    .cat-btn[data-cat="speed"].active { background: #FF9800; box-shadow: 0 2px 8px rgba(255,152,0,0.35); }
    .cat-btn[data-cat="brain"].active { background: #9C27B0; box-shadow: 0 2px 8px rgba(156,39,176,0.35); }
    .cat-btn[data-cat="math"].active  { background: #29B6F6; box-shadow: 0 2px 8px rgba(41,182,246,0.35); }
    .cat-btn[data-cat="knowledge"].active { background: #EC407A; box-shadow: 0 2px 8px rgba(236,64,122,0.35); }
    .cat-btn[data-cat="coop"].active { background: #00ACC1; box-shadow: 0 2px 8px rgba(0,172,193,0.35); }
    .cat-btn[data-cat="puzzle"].active { background: #7C4DFF; box-shadow: 0 2px 8px rgba(124,77,255,0.35); }

    /* 게임 카드 그리드 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-size), 1fr));
      gap: var(--space-md);
      padding: 0 var(--space-lg) var(--space-lg);
    }

    .game-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:active {
      transform: scale(1.03);
      box-shadow: var(--shadow-card-hover);
    }

    .game-card-thumb {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: var(--thumb-color, #ccc) !important;
    }

    .game-card-info {
      padding: var(--space-sm) var(--space-md);
      text-align: center;
    }

    .game-card-name {
      font-size: var(--font-size-card);
      font-weight: 700;
    }

    .game-card-time {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* SVG 아이콘 */
    .card-icon-svg {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .card-icon-svg svg {
      width: 65%;
      height: 65%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
    }

    /* 카드 숨김 (필터) */
    .game-card.hidden {
      display: none;
    }

    /* ═══════════════════════════════════════════════════════════
       LEVEL 3 PREVIEW — 디자인풍 전환 (메인 페이지)
       복원: 이 블록만 통째로 삭제하면 됨
       ═══════════════════════════════════════════════════════════ */

    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(124,77,255,0.10) 0, transparent 30%),
        radial-gradient(circle at 88% 92%, rgba(255,193,7,0.10) 0, transparent 35%),
        #FFF8F0 !important;
      background-attachment: fixed;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.04) 1.5px, transparent 1.5px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* 헤더 */
    .launcher-header {
      padding: 20px 24px 8px;
      align-items: center;
    }
    .brand-logo {
      width: 56px !important;
      height: 56px !important;
      filter: drop-shadow(0 6px 14px rgba(124,77,255,0.4));
    }
    .launcher-title {
      font-size: 2.2rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.03em !important;
      -webkit-text-stroke: 0;
      text-shadow: 0 4px 0 rgba(124,77,255,0.18);
    }

    /* 사운드 토글 — 청키하게 */
    .sound-toggle {
      width: 52px !important;
      height: 52px !important;
      border-radius: 50% !important;
      background: #fff !important;
      border: 3px solid #2C2C2C !important;
      box-shadow: 4px 4px 0 #2C2C2C !important;
      font-size: 1.4rem !important;
    }
    .sound-toggle:active {
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0 #2C2C2C !important;
    }

    /* 필터 버튼 — 청키 캡슐 + 검정 테두리 */
    .filter-section {
      padding: 0 24px;
    }
    .filter-bar {
      gap: 10px !important;
      margin-bottom: 20px !important;
    }
    .filter-btn {
      padding: 12px 22px !important;
      border-radius: 999px !important;
      background: #fff !important;
      border: 3px solid #2C2C2C !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      font-weight: 800 !important;
      font-size: 0.95rem !important;
      color: #2C2C2C !important;
      transition: all 0.1s ease !important;
    }
    .filter-btn:active {
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 #2C2C2C !important;
    }
    .filter-btn.active {
      color: #fff !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
    }
    .cat-btn[data-cat="speed"].active     { background: #FF7043 !important; }
    .cat-btn[data-cat="brain"].active     { background: #AB47BC !important; }
    .cat-btn[data-cat="math"].active      { background: #26C6DA !important; }
    .cat-btn[data-cat="knowledge"].active { background: #EC407A !important; }
    .cat-btn[data-cat="coop"].active      { background: #66BB6A !important; }
    .cat-btn[data-cat="puzzle"].active    { background: #7C4DFF !important; }
    .filter-btn[data-cat="all"].active    { background: #5C6BC0 !important; }

    /* 게임 카드 — 두꺼운 검정 테두리, 큰 그림자, 라운드 ↑ */
    .game-grid {
      gap: 18px !important;
      padding: 0 24px 100px !important;
    }
    .game-card {
      background: #fff !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 3px solid #2C2C2C !important;
      border-radius: 22px !important;
      box-shadow: 6px 6px 0 #2C2C2C !important;
      overflow: hidden !important;
      transition: all 0.12s ease !important;
    }
    .game-card:hover {
      transform: translate(-2px,-2px);
      box-shadow: 8px 8px 0 #2C2C2C !important;
    }
    .game-card:active {
      transform: translate(3px,3px) !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
    }
    .game-card-thumb {
      border-bottom: 3px solid #2C2C2C !important;
      aspect-ratio: 1.05 !important;
      position: relative;
    }
    /* 인원수 알약 배지 (디자인 1) */
    .player-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #FFD54F;
      border: 2px solid #2C2C2C;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 900;
      color: #2C2C2C;
      box-shadow: 2px 2px 0 #2C2C2C;
      letter-spacing: -0.02em;
      z-index: 5;
      pointer-events: none;
    }
    .card-icon-svg svg {
      width: 70% !important;
      height: 70% !important;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.18));
    }
    .game-card-info {
      padding: 12px 14px 14px !important;
    }
    .game-card-name {
      font-size: 1.05rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.01em !important;
    }
    .game-card-time {
      font-size: 0.78rem !important;
      font-weight: 700 !important;
      color: #888 !important;
      margin-top: 4px !important;
    }

    /* TouchGame retro arcade skin */
    :root {
      --arcade-bg: #101827;
      --arcade-panel: #172033;
      --arcade-panel-2: #202b43;
      --arcade-line: #2dd4bf;
      --arcade-pink: #f472b6;
      --arcade-yellow: #facc15;
      --arcade-green: #22c55e;
      --arcade-text: #f8fafc;
      --arcade-muted: #9ca3af;
      --font-family: 'DungGeunMo', 'Galmuri11', 'NeoDunggeunmo', 'DNFBitBitv2', 'Pretendard Variable', 'Noto Sans KR', system-ui, sans-serif;
      --card-radius: 8px;
      --btn-radius: 8px;
      --card-min-size: 152px;
    }

    body {
      background:
        linear-gradient(rgba(45,212,191,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,212,191,0.08) 1px, transparent 1px),
        linear-gradient(180deg, #101827 0%, #111827 48%, #182033 100%) !important;
      background-size: 28px 28px, 28px 28px, 100% 100% !important;
      color: var(--arcade-text) !important;
    }
    body::before {
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 4px) !important;
      background-size: auto !important;
      opacity: 0.4;
    }

    .launcher-header {
      padding: 18px clamp(14px, 3vw, 34px) 10px !important;
      border-bottom: 1px solid rgba(45,212,191,0.28);
    }
    .brand { gap: 10px !important; min-width: 0; }
    .brand-logo {
      width: 48px !important;
      height: 48px !important;
      border: 2px solid var(--arcade-line);
      border-radius: 8px;
      box-shadow: 0 0 0 2px #0f172a, 5px 5px 0 #000, 0 0 18px rgba(45,212,191,0.45) !important;
      filter: none !important;
    }
    .launcher-title {
      color: var(--arcade-yellow) !important;
      background: none !important;
      -webkit-text-fill-color: var(--arcade-yellow) !important;
      text-shadow: 3px 3px 0 #000, 0 0 16px rgba(250,204,21,0.42) !important;
      letter-spacing: 0 !important;
      font-size: clamp(1.8rem, 5vw, 3.1rem) !important;
      line-height: 1;
    }
    .sound-toggle {
      border-radius: 8px !important;
      border: 2px solid var(--arcade-line) !important;
      background: #0f172a !important;
      color: var(--arcade-text) !important;
      box-shadow: 4px 4px 0 #000 !important;
    }

    .arcade-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
      gap: 16px;
      padding: 16px clamp(14px, 3vw, 34px) 14px;
      align-items: stretch;
    }
    .arcade-copy,
    .arcade-panel {
      border: 2px solid var(--arcade-line);
      border-radius: 8px;
      background: rgba(23,32,51,0.94);
      box-shadow: 6px 6px 0 #000;
      min-width: 0;
    }
    .arcade-copy {
      padding: clamp(16px, 3vw, 26px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }
    .arcade-kicker {
      color: var(--arcade-pink);
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .arcade-copy h2 {
      margin: 0;
      color: var(--arcade-text);
      font-size: clamp(1.35rem, 4vw, 2.2rem);
      line-height: 1.2;
      letter-spacing: 0;
      text-shadow: 2px 2px 0 #000;
    }
    .arcade-copy p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.55;
      font-weight: 700;
    }
    .arcade-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .arcade-stat {
      border: 1px solid rgba(45,212,191,0.55);
      background: #0f172a;
      color: var(--arcade-text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 900;
    }
    .arcade-panel {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .arcade-panel-title {
      color: var(--arcade-yellow);
      font-weight: 900;
      font-size: 0.9rem;
    }
    .quick-picks {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .quick-pick {
      border: 1px solid rgba(248,250,252,0.18);
      border-radius: 6px;
      background: var(--arcade-panel-2);
      color: var(--arcade-text);
      padding: 10px;
      min-height: 48px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .quick-pick span { color: var(--arcade-muted); font-size: 0.78rem; }
    .quick-pick.active {
      background: var(--arcade-yellow);
      color: #101827;
      border-color: var(--arcade-yellow);
      box-shadow: 0 0 18px rgba(250,204,21,0.32);
    }
    .quick-pick.active span { color: #334155; }

    .filter-section {
      padding: 0 clamp(14px, 3vw, 34px) !important;
    }
    .filter-bar {
      gap: 8px !important;
      margin-bottom: 16px !important;
      overflow-x: auto;
      flex-wrap: nowrap !important;
      padding-bottom: 6px;
    }
    .filter-btn {
      min-height: 44px;
      border-radius: 8px !important;
      border: 2px solid rgba(248,250,252,0.2) !important;
      background: #172033 !important;
      color: #cbd5e1 !important;
      box-shadow: 4px 4px 0 #000 !important;
      white-space: nowrap;
      letter-spacing: 0 !important;
    }
    .filter-btn.active {
      background: var(--arcade-yellow) !important;
      color: #101827 !important;
      border-color: var(--arcade-yellow) !important;
      box-shadow: 4px 4px 0 #000, 0 0 18px rgba(250,204,21,0.32) !important;
    }

    .game-grid {
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-size), 1fr)) !important;
      gap: 14px !important;
      padding: 0 clamp(14px, 3vw, 34px) 96px !important;
    }
    .game-card {
      background: #111827 !important;
      border: 2px solid rgba(45,212,191,0.7) !important;
      border-radius: 8px !important;
      box-shadow: 5px 5px 0 #000 !important;
      color: var(--arcade-text) !important;
    }
    .game-card:hover {
      transform: translate(-2px,-2px) !important;
      border-color: var(--arcade-yellow) !important;
      box-shadow: 7px 7px 0 #000, 0 0 18px rgba(45,212,191,0.25) !important;
    }
    .game-card-thumb {
      aspect-ratio: 1.12 !important;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0)),
        var(--thumb-color, #202b43) !important;
      border-bottom: 2px solid rgba(45,212,191,0.7) !important;
    }
    .player-badge {
      border: 1px solid #000 !important;
      border-radius: 4px !important;
      background: var(--arcade-green) !important;
      color: #04130a !important;
      box-shadow: 2px 2px 0 #000 !important;
      font-size: 0.72rem !important;
    }
    .game-card-info {
      padding: 11px 10px 12px !important;
      text-align: left !important;
    }
    .game-card-name {
      font-size: 0.98rem !important;
      color: var(--arcade-text);
      letter-spacing: 0 !important;
      line-height: 1.25;
      min-height: 2.4em;
      display: flex;
      align-items: center;
    }
    .game-card-time {
      color: var(--arcade-muted) !important;
      font-size: 0.74rem !important;
      font-weight: 900 !important;
    }
    .game-card-cat {
      color: var(--arcade-line);
      font-size: 0.7rem;
      font-weight: 900;
      margin-top: 4px;
      text-transform: uppercase;
    }
    @media (max-width: 760px) {
      .arcade-hero {
        grid-template-columns: 1fr;
        padding-top: 12px;
      }
      .arcade-panel { order: -1; }
      .quick-picks { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .quick-pick { flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 460px) {
      .launcher-header { padding-top: 14px !important; }
      .brand-logo { width: 42px !important; height: 42px !important; }
      .quick-picks { grid-template-columns: 1fr; }
      .game-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .game-card-name { font-size: 0.88rem !important; }
    }
  </style>
</head>
<body>

  <header class="launcher-header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 48 48" width="44" height="44" aria-hidden="true">
        <defs>
          <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c4dff"/>
            <stop offset="100%" stop-color="#5c6bc0"/>
          </linearGradient>
        </defs>
        <!-- Rounded-square app-icon background -->
        <rect x="2" y="2" width="44" height="44" rx="11" fill="url(#brandGrad)"/>
        <!-- Subtle top shine -->
        <path d="M13 2 L35 2 Q45 2 45 12 L45 16 Q24 24 3 16 L3 12 Q3 2 13 2 Z" fill="#fff" opacity="0.10"/>
        <!-- White clock face -->

      { folder:'pattern-next', name:'다음 무늬', description:'반복되는 무늬를 보고 다음에 올 무늬를 4지선다에서 가장 먼저 골라요! 규칙 추론', icon:'🔷', color:'#7E57C2', grades:[1,2,3,4], playTime:'1분' },

      { folder:'relation-match', name:'짝 찾기', description:'서로 어울리는 짝을 4지선다에서 가장 먼저 골라요! 바늘-실, 벌-꿀처럼 관계 추론', icon:'🧩', color:'#7E57C2', grades:[1,2,3,4], playTime:'1분' },
      { folder:'skip-count', name:'뛰어 세기', description:'2씩·5씩 뛰어 센 수열의 빈칸에 들어갈 수를 가장 먼저 골라요! 1-3학년 규칙·수 세기', icon:'🔢', color:'#00897B', grades:[1,2,3], playTime:'1분' },
      { folder:'job-tool', name:'직업과 도구', description:'도구를 보고 알맞은 직업을 4지선다에서 가장 먼저 골라요! 직업 탐색·어휘', icon:'🧰', color:'#5C6BC0', grades:[1,2,3,4], playTime:'1분' },
      { folder:'idiom-quiz', name:'사자성어', description:'뜻풀이를 보고 알맞은 사자성어를 4지선다에서 가장 먼저 골라요! 3-6학년 국어 어휘', icon:'📖', color:'#8E24AA', grades:[3,4,5,6], playTime:'1분' },
      { folder:'ten-frame', name:'십틀 채우기', description:'십틀(2×5)에 놓인 점이 몇 개인지 세어 가장 먼저 골라요! 1-3학년 수 세기·수 감각', icon:'🔟', color:'#0097A7', grades:[1,2,3], playTime:'1분' }
    ];

    const grid = document.getElementById('gameGrid');
    const catBtns = document.querySelectorAll('#catFilter .cat-btn');
    const quickBtns = document.querySelectorAll('.quick-pick');
    const soundToggle = document.getElementById('soundToggle');
    const totalGamesStat = document.getElementById('totalGamesStat');
    let allGames = [];
    let currentCat = 'all';
    let currentQuick = '';

    // --- 사운드 토글 ---
    function updateSoundIcon() {
      const muted = sessionStorage.getItem('sound-muted') !== 'false';
      soundToggle.textContent = muted ? '🔇' : '🔊';
    }
    soundToggle.addEventListener('click', function() {
      const wasMuted = sessionStorage.getItem('sound-muted') !== 'false';
      sessionStorage.setItem('sound-muted', !wasMuted);
      updateSoundIcon();
    });
    updateSoundIcon();

    // --- 썸네일 파스텔 색상 변환 ---
    function pastelColor(hex) {
      var r = parseInt(hex.slice(1,3),16);
      var g = parseInt(hex.slice(3,5),16);
      var b = parseInt(hex.slice(5,7),16);
      r = Math.round(r * 0.7);
      g = Math.round(g * 0.7);
      b = Math.round(b * 0.7);
      return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
    }

    function gameCategory(game) {
      return game.category || CATEGORY_MAP[game.folder] || 'brain';
    }

    function playerLabel(game) {
      if (Array.isArray(game.players) && game.players.length) {
        if (game.players.length === 1) return game.players[0] + '명';
        return game.players[0] + '-' + game.players[game.players.length - 1] + '명';
      }
      return PLAYER_COUNTS[game.folder] || '2-4명';
    }

    function gameTags(game) {
      var tags = Array.isArray(game.tags) ? game.tags.slice() : [];
      var players = playerLabel(game);
      var cat = gameCategory(game);
      if (players === '2명') tags.push('two-player');
      if (cat === 'coop') tags.push('co-op');
      if (cat === 'puzzle') tags.push('puzzle');
      if (String(game.playTime || '').indexOf('30') >= 0) tags.push('quick');
      return tags.filter(function(tag, index) { return tags.indexOf(tag) === index; });
    }

    // --- 카드 렌더링 ---
    function renderCards(games) {
      grid.innerHTML = '';
      allGames = games;
      totalGamesStat.textContent = games.length + ' GAMES';
      games.forEach(function(game) {
        var a = document.createElement('a');
        a.className = 'game-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.setAttribute('aria-label', game.name + ' 게임 시작');
        a.dataset.grades = JSON.stringify(game.grades);
        a.dataset.cat = gameCategory(game);
        a.dataset.tags = gameTags(game).join(',');
        var players = playerLabel(game);
        a.innerHTML =
          '<div class="game-card-thumb" style="--thumb-color:' + pastelColor(game.color) + '">' +
            '<span class="player-badge">' + players + '</span>' +
            '<span class="card-icon-svg">' + (GAME_ICONS[game.folder] || game.icon) + '</span>' +
          '</div>' +
          '<div class="game-card-info">' +
            '<div class="game-card-name">' + game.name + '</div>' +
            '<div class="game-card-time">' + game.playTime + '</div>' +
            '<div class="game-card-cat">' + a.dataset.cat + '</div>' +
          '</div>';
        grid.appendChild(a);
      });
      applyFilters();
    }

    // --- 필터 적용 (카테고리) ---
    function applyFilters() {
      var cards = grid.querySelectorAll('.game-card');
      cards.forEach(function(card) {
        var cat = card.dataset.cat;
        var catOk = (currentCat === 'all') || (cat === currentCat);
        var tagOk = !currentQuick || card.dataset.tags.split(',').indexOf(currentQuick) >= 0;
        card.classList.toggle('hidden', !(catOk && tagOk));
      });
    }

    // --- 카테고리 필터 ---
    catBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        catBtns.forEach(function(b) { b.classList.remove('active'); });
        quickBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        currentQuick = '';
        applyFilters();
      });
    });

    quickBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var nextQuick = currentQuick === btn.dataset.quick ? '' : btn.dataset.quick;
        quickBtns.forEach(function(b) { b.classList.remove('active'); });
        catBtns.forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('#catFilter .cat-btn[data-cat="all"]').classList.add('active');
        currentCat = 'all';
        currentQuick = nextQuick;
        if (currentQuick) btn.classList.add('active');
        applyFilters();
      });
    });

    var loadedGames = [];

    function renderRankingPanel() {
      var list = document.getElementById('rankingList');
      var summaries = getAllGameSummaries().filter(function (s) { return s.best !== null; });
      summaries.sort(function (a, b) { return b.lastPlayedTs - a.lastPlayedTs; });
      if (summaries.length === 0) {
        list.innerHTML = '<p style="padding:20px;text-align:center;color:var(--text-sub);">아직 플레이한 게임이 없어요.</p>';
        return;
      }
      list.innerHTML = summaries.map(function (s) {
        var meta = loadedGames.find(function (g) { return g.folder === s.gameId; });
        var name = meta ? meta.name : s.gameId;
        var icon = meta ? meta.icon : '🎮';
        return '<div class="ranking-row">' +
          '<span class="ranking-icon">' + icon + '</span>' +
          '<span class="ranking-name">' + name + '</span>' +
          '<span class="ranking-best">' + s.best + '점</span>' +
          '<span class="ranking-plays">' + s.plays + '회 플레이</span>' +
          '</div>';
      }).join('');
    }

    document.getElementById('rankingToggle').addEventListener('click', function () {
      renderRankingPanel();
      document.getElementById('rankingOverlay').style.display = 'flex';
    });
    document.getElementById('rankingClose').addEventListener('click', function () {
      document.getElementById('rankingOverlay').style.display = 'none';
    });

    // --- 게임 목록 로딩 ---
    async function loadGames() {
      try {
        var res = await fetch('games/registry.json');
        var folders = await res.json();

        // Parallel fetch all game.json files
        var games = await Promise.all(folders.map(function(folder) {
          return fetch('games/' + folder + '/game.json')
            .then(function(r) {
              if (!r.ok) throw new Error(folder);
              return r.json();
            })
            .then(function(meta) {
              meta.folder = folder;
              return meta;
            })
            .catch(function() {
              // Per-game error isolation: skip failed games
              console.warn('Failed to load:', folder);
              return null;
            });
        }));

        // Filter out failed games
        var validGames = games.filter(function(g) { return g !== null; });

        if (validGames.length === 0) {
          // All failed → fall back
          loadedGames = FALLBACK_GAMES;
          renderCards(FALLBACK_GAMES);
        } else {
          loadedGames = validGames;
          renderCards(validGames);
        }
      } catch (e) {
        // Registry fetch failed → fallback
        renderCards(FALLBACK_GAMES);
      }
    }

    // Verify engine.js loaded
    if (typeof createTimer !== 'function' || typeof onTap !== 'function') {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h1>오류</h1><p>게임 엔진을 불러오지 못했습니다.<br>새로고침해주세요.</p><button onclick="location.reload()" style="padding:12px 24px;background:#7c5cfc;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">새로고침</button></div>';
    } else {
      loadGames();
    }

    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
